name: Recipe Integration Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test-recipes:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # WICHTIG!

    steps:
      - name: Checkout Recipes Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Build Packages
        run: |
          chmod +x ./build-all.sh
          ./build-all.sh

      - name: Run Docker Integration Test
        run: |
          chmod +x ./tests/test.sh
          ./tests/test.sh

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' # Nur bei Änderungen am main-branch deployen
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist     
          branch: gh-pages 
          clean: true